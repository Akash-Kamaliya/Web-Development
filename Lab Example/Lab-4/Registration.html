<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="#" id="form">
      <h1>Student Registration</h1>
      <div>
        <label for="name"> Full Name </label>
        <input type="text" id="name" />
      </div>
      <br />
      <div>
        <label for="email"> Emai </label>
        <input type="email" id="email" />
      </div>
      <br />
      <div>
        <label for="mobile">Mobile Number</label>
        <input type="number" max="10" id="mobile" />
      </div>
      <div>
        <br />
        <label for="address"> Address </label>
        <textarea id="address" placeholder="Enter your address...."> </textarea>
      </div>
      <br />
      <div>
        <label for="nation"> Nationality </label>
        <input type="text" id="nation" />
      </div>
      <br />
      <div>
        <label for="date"> Birth Date </label>
        <input type="date" id="date" />
      </div>
      <br />
      <div>
        <label for="gender">Gender</label>
        <input type="radio" id="Male" name="gender" value="Male" />
        <label for="Male">Male</label>
        <input type="radio" id="Female" name="gender" value="Female" />
        <label for="Female">Female</label>
      </div>
      <br />
      <div>
        <label for="degree">Highest Degree</label>
        <select name="degree" id="degree">
          <option value="msc">M.Sc.</option>
          <option value="btech">B.Tech.</option>
          <option value="mtech">M.Tech.</option>
        </select>
      </div>
      <br />
      <div>
        <label for="cpi">CPI</label>
        <input type="number" name="cpi" id="cpi" />
      </div>
      <br />
      <div>
        <label for="uni">University</label>
        <input type="text" name="uni" id="uni" />
      </div>
      <br />
      <div>
        <label for="year">Highest Degree</label>
        <select name="year" id="year">
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
        </select>
      </div>
      <br />
      <div>
        <input type="submit" value="submit" />
        <input type="reset" value="cancel" />
      </div>
    </form>
  </body>
</html>
