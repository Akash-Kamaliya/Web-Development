<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CreateAcount.css">
</head>
<body>
    <form action="#" id="form">
        <h2 class="h3">Create Account</h2>
        <div class="div1">
            <label for="name1" class="name1">First Name*</label>
            <label for="name2" class="name2">Last Name*</label>      
            <br>
            <input type="text" name="name1" id="name1">&nbsp;&nbsp;&nbsp;&nbsp;
            <input type="text" name="name2" id="name2">
        </div>
        <div class="div2">
            <label for="email" class="email">Email*</label>
            <br>
            <input type="email" name="email" id="email">
        </div>
        <div class="div1">
            <label for="name1" class="name1">Password*</label>
            <label for="name2" class="name2">&nbsp;&nbsp;&nbsp;Confirm Password*</label>      
            <br>
            <input type="password" name="name1" id="name1">&nbsp;&nbsp;&nbsp;&nbsp;
            <input type="password" name="name2" id="name2">
        </div>
        <div class="div3">
            <label for="gender" class="email">Gender*</label>
            <label for="hobi" class="hobi"> Hobbies*</label>
            <br>
            <input type="radio" id="Male" name="gender" value="Male" />
            <label for="Male">Male</label>
            <input type="radio" id="Female" name="gender" value="Female" />
            <label for="Female">Female</label>
            <span class="span1">
                <input type="checkbox" name="hobi" id="music">
                <label for="music">Music</label>
                <input type="checkbox" name="hobi" id="dance">
                <label for="music">Dance</label>
            </span>
        </div>
        <div class="div1">
            <label for="sorce" class="email">Sorce of Income*</label>
            <label for="income" class="income">Income*</label>
            <br>
            <select name="sorce" id="sorce">
                <option value="none">......</option>
                <option value="job">Job</option>
                <option value="bes">Bisness</option>
            </select>
            <input type="range" name="range" id="income" max="20k">
        </div>
        <div class="div1">
            <label for="name1" class="photo">Upload a Picture*</label>
            <label for="name2" class="age">Age*</label>      
            <br>
            <input type="file" name="name1" id="file">
            <input type="number" name="name2" id="num">
        </div>
        <div>
            <label for="bio" class="bio">Bio</label>
            <br>
            <input type="text" name="bio" id="bio">
        </div>
        <br>
        <div class="sub">
            <button type="submit" class="sub1">Create</button>
        </div>
    </form>
</body>
</html>
