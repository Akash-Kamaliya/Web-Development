<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#">
        <h1 >Employee Registration</h1>
        <h4>Personal Information</h4>
        <div>
            <label for="id">Employee ID</label>
            <input type="number" name="id" id="id">
            <label for="name">Employee Name</label>
            <input type="text" name="name" id="name">
        </div>
        <br>
        <div>
            <label for="email">Email</label>
            <input type="email" name="email" id="email">
            <label for="contect">Contect No.</label>
            <input type="number" name="contect" id="contect">
        </div>
        <br>
        <div>
            <label for="state">Marital Status</label>
                <input type="radio" id="Single" name="state" value="Single" />
                <label for="Single">Single</label>
                <input type="radio" id="Married" name="state" value="Married" />
                <label for="Married">Married</label>
        </div>
        <h4>Education Qualification</h4>
        <div>
            <label for="edu">Education :</label>
            <input type="text" name="edu" id="edu">
            <label for="ex">Experiance</label>
            <input type="text" name="ex" id="ex">
        </div>
        <h4>Job Details </h4>
        <div>
            <label for="des">Disignation</label>
            <input type="text" name="des" id="des">
            <label for="job">Job Locaiton</label>
            <input type="text" name="job" id="job">
        </div>
        <br>
        <div>
            <label for="sal">Salary</label>
            <input type="number" name="sal" id="sal">
        </div>
        <hr>
        <div>
            <button type="submit">Register</button>
        </div>
    </form>
</body>
</html>
